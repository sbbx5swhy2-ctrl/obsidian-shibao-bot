name: 每日时报邮件

on:
  schedule:
    # 北京时间每天早上 6:00 (UTC 22:00)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        type: choice
        options:
          - email
          - obsidian
        default: email

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 设置时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai

      - name: 运行时报机器人
        env:
          SHIBAO_MODE: ${{ inputs.mode || 'email' }}
          SHIBAO_EMAIL_USER: ${{ secrets.SHIBAO_EMAIL_USER }}
          SHIBAO_EMAIL_PASS: ${{ secrets.SHIBAO_EMAIL_PASS }}
          SHIBAO_EMAIL_TO: ${{ secrets.SHIBAO_EMAIL_TO }}
        run: python -m src.main

      - name: 提交状态更新
        if: success()
        run: |
          git config user.name "shibao-bot"
          git config user.email "bot@shibao.local"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "状态无变化，跳过提交"
          else
            git commit -m "chore: 更新 seen.json [skip ci]"
            git push
          fi
