name: Daily Shibao Email

on:
  schedule:
    - cron: "0 6 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-shibao-email
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set timezone
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Send daily report email
        env:
          SHIBAO_MODE: email
          SHIBAO_EMAIL_TO: ${{ secrets.SHIBAO_EMAIL_TO }}
          SHIBAO_EMAIL_FROM: ${{ secrets.SHIBAO_EMAIL_FROM }}
          SHIBAO_RESEND_KEY: ${{ secrets.SHIBAO_RESEND_KEY }}
          SHIBAO_EMAIL_USER: ${{ secrets.SHIBAO_EMAIL_USER }}
          SHIBAO_EMAIL_PASS: ${{ secrets.SHIBAO_EMAIL_PASS }}
          SHIBAO_SMTP_HOST: ${{ secrets.SHIBAO_SMTP_HOST }}
          SHIBAO_SMTP_PORT: ${{ secrets.SHIBAO_SMTP_PORT }}
        run: python -m src.main

      - name: Commit seen state
        if: success()
        run: |
          git config user.name "shibao-bot"
          git config user.email "bot@shibao.local"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "No seen state changes."
          else
            git commit -m "chore: update seen state [skip ci]"
            git push
          fi
